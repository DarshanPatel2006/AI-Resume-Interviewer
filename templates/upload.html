<!DOCTYPE html>
<html>
<head>
<title>AI Interview Simulator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-xl">

<h1 class="text-3xl font-bold text-center mb-6">AI Interview Simulator</h1>

<p class="text-gray-600 text-center mb-6">
Upload your resume and start a simulated interview.
</p>

{% if error %}
<div class="bg-red-100 text-red-700 p-4 rounded mb-4">
{{ error }}
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data" class="space-y-4">

<input type="file" name="resume"
class="w-full border rounded-lg p-3">

<button
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-semibold">
Start Interview
</button>

</form>

</div>

</body>
</html>
